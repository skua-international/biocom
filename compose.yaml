name: skua-biocom

services:
  biocom:
    build:
      context: .
      dockerfile: Dockerfile
    image: biocom-bot:latest
    container_name: biocom-bot
    restart: unless-stopped
    
    # Run as root to access Docker socket (required for container ops)
    user: root
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 32M
          cpus: '0.1'
    
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      UPLOAD_BASE: /app/uploads
      BIOCOM_CONFIG: /app/biocom.toml
      TZ: UTC
    
    env_file:
      - .env
    
    volumes:
      - ./biocom.toml:/app/biocom.toml:ro
      - ./uploads/missions:/app/uploads/missions:rw
      - ./uploads/presets:/app/uploads/presets:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Read-only root filesystem (uploads mounted rw)
    read_only: true
    
    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"